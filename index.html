<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Secret Diary 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="petals" id="petals"></div>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <h1>Our Secret Diary 💖</h1>

    <input type="text" id="auth-name" placeholder="Your Name 💖">
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-password" placeholder="Password">

    <button onclick="handleAuth()">Enter 💌</button>
  </div>
</div>

<!-- DIARY -->
<div id="diary-screen" class="screen">
  <div class="top">
    <span id="user-badge"></span>
    <button onclick="handleLogout()">Logout</button>
  </div>

  <textarea id="entry-text" placeholder="Write something... 💖"></textarea>
  <button onclick="saveEntry()">Save 💕</button>

  <div id="entries-container"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
