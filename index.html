<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Secret Diary 💖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Floating petals background -->
  <div class="petals" id="petals"></div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="auth-header">
        <div class="heart-icon">💖</div>
        <h1 class="auth-title">Our Secret Diary</h1>
        <p class="auth-subtitle">A private place, just for two</p>
      </div>

      <div class="auth-card">
        <div id="auth-error" class="auth-error hidden"></div>
        <div id="auth-info" class="auth-info hidden"></div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email"/>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <button class="btn-primary" id="auth-btn" onclick="handleAuth()">
          <span id="auth-btn-text">Enter Our Diary</span>
          <div id="auth-spinner" class="spinner hidden"></div>
        </button>

        <p class="auth-note">No account? We'll create one for you ✨</p>
      </div>
    </div>
  </div>

  <!-- DIARY SCREEN -->
  <div id="diary-screen" class="screen">
    <!-- Top bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <span class="top-bar-heart">💖</span>
        <span class="top-bar-title">Our Secret Diary</span>
      </div>
      <div class="top-bar-right">
        <span class="user-badge" id="user-badge">...</span>
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
      </div>
    </header>

    <main class="diary-main">
      <!-- Write entry panel -->
      <section class="write-panel">
        <div class="write-card">
          <div class="write-card-header">
            <span class="write-icon">✍️</span>
            <span class="write-date" id="write-date"></span>
          </div>
          <textarea
            id="entry-text"
            class="diary-textarea"
            placeholder="Dear diary… what's on your heart today? 🌸"
            maxlength="2000"
          ></textarea>
          <div class="write-footer">
            <span class="char-count" id="char-count">0 / 2000</span>
            <button class="btn-save" id="save-btn" onclick="saveEntry()">
              <span id="save-btn-text">Save Entry 💕</span>
              <div id="save-spinner" class="spinner hidden"></div>
            </button>
          </div>
        </div>
      </section>

      <!-- Entries feed -->
      <section class="feed-panel">
        <div class="feed-header">
          <h2 class="feed-title">Our Stories</h2>
          <div class="live-badge">● Live</div>
        </div>

        <div id="entries-container" class="entries-container">
          <div class="loading-state" id="loading-state">
            <div class="loading-heart">💗</div>
            <p>Loading your diary…</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- BLOCKED SCREEN -->
  <div id="blocked-screen" class="screen">
    <div class="blocked-container">
      <div class="blocked-icon">🔒</div>
      <h2>Private Diary</h2>
      <p>This diary is only for two special people.<br/>Your email isn't on the guest list.</p>
      <button class="btn-primary" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>
</body>
        </html>
