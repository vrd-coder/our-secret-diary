<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Secret Diary 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  margin:0;
  background:#ffd6e7;
}
.screen{display:none;}
.screen.active{display:block;}
.container{
  max-width:400px;
  margin:40px auto;
  background:white;
  padding:20px;
  border-radius:20px;
}
textarea{
  width:100%;
  height:120px;
}
button{
  padding:10px;
  margin-top:10px;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="auth-screen" class="screen active">
  <div class="container">
    <h2>Login 💖</h2>
    <input id="auth-email" placeholder="Email"><br><br>
    <input id="auth-password" type="password" placeholder="Password"><br><br>
    <button onclick="handleAuth()">Enter</button>
  </div>
</div>

<!-- DIARY -->
<div id="diary-screen" class="screen">
  <div class="container">
    <h2>Our Diary 💕</h2>

    <textarea id="entry-text" placeholder="Write..."></textarea>
    <button onclick="saveEntry()">Save</button>
    <button onclick="handleLogout()">Logout</button>

    <div id="entries-container"></div>
  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
